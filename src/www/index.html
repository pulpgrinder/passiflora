<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <link rel="stylesheet" href="passiflora/menu.css">
</head>

<body>
    <div class="hamburgermenu">≡</div>
    <h1>Test Page</h1>
    <p>This is a test page for the HTML structure.</p>
    <p>
        <img src="test.png" alt="Test Image">
    </p>
    <p>
        <a href="test.html">Visit Test Page</a>
        <a href="https://amazon.com">Visit Amazon</a>
        <button onclick="PassifloraIO.openExternal('https://google.com')">Open Google in new browser window</button>
        <button onclick="checkLocation()">Check Location</button>
        <button onclick="testFileSystem()">Test File System</button>
    </p>
    <h2>Media Tests</h2>
    <p>
        <button onclick="testScreenshot()">Take Screenshot</button>
        <button onclick="testListCameras()">List Cameras</button>
        <button onclick="testCaptureImage()">Capture Image (default)</button>
        <button onclick="testCaptureImage(1)">Capture Image (camera 1)</button>
        <button onclick="testCaptureImage(2)">Capture Image (camera 2)</button>
    </p>
    <p>
        <button onclick="testStartAudio()">Start Audio Recording</button>
        <button onclick="testStopAudio()">Stop Audio Recording</button>
        <button onclick="testGetAudio()">Get Audio Recording</button>
    </p>
    <p>
        <button onclick="testStartVideo()">Start Video Recording</button>
        <button onclick="testStopVideo()">Stop Video Recording</button>
        <button onclick="testGetVideo()">Get Video Recording</button>
    </p>
    <p>
        <img id="mediaPreview" style="max-width:100%;display:none;">
        <audio id="audioPreview" controls style="display:none;"></audio>
        <video id="videoPreview" controls style="max-width:100%;display:none;"></video>
    </p>
    <p id="result">


    </p>
<script>
    async function testFileSystem() {
        try {
            var username = await PassifloraIO.getUsername();
            logResult("Current username: " + username);
        } catch(e) {
            logResult("Error getting username: " + e.message);
        }
        try {
           let homeFolder = await PassifloraIO.getHomeFolder();
            logResult("Home folder: " + homeFolder);
            try {
            logResult("Testing file write...");
            let testFilePath = homeFolder + "/testfile.txt";
            let fh = await fopen(testFilePath, "w");
            await fputs(fh, "This is a test file.");
            await fclose(fh);
            logResult("Successfully wrote to file: " + testFilePath);
        } catch(e) {
            logResult("Error writing test file: " + e.message);
        }
  
        try {
            logResult("Testing file read...");
            let testFilePath = homeFolder + "/testfile.txt";
            let fh = await fopen(testFilePath, "r");
            let contents = await fgets(fh);
            await fclose(fh);
            logResult("Contents of test file: " + contents);
        } catch(e) {
            logResult("Error reading test file: " + e.message);
        }
        try {
            logResult ("Testing file delete...");
            let testFilePath = homeFolder + "/testfile.txt";
            await remove(testFilePath);
            logResult("Successfully deleted test file: " + testFilePath);
        } catch(e) {
            logResult("Error deleting test file: " + e.message);
        }
        try {
            logResult("Testing (to be left in file system)...");
            let testFilePath = homeFolder + "/frompassiflora.txt";
            let fh = await fopen(testFilePath, "w");
            await fputs(fh, "This is a test file from passiflora.");
            await fclose(fh);
            logResult("Successfully wrote to file: " + testFilePath);
            logResult("You should now have a file named 'frompassiflora.txt' in the home folder.");
            logResult("On iPhone and iPad, the home folder will appear in the Files app at On My (iPhone or iPad)/" + PassifloraConfig.progname);
            logResult("On Mac, the home folder will be your user home directory, typically /Users/&lt;username&gt;.");
            logResult("On Windows, the home folder will be your user profile directory, typically C:\\Users\\&lt;username&gt;.");
            logResult("On Linux, the home folder will be your user home directory, typically /home/&lt;username&gt;.");
            logResult("On Android, the home folder will be in Documents/" + PassifloraConfig.progname + ", accessible via the Files app or any file manager.");
            logResult("(Note: On Android, access to this public folder requires the androidexternalstorage permission to be enabled in src/permissions.)");
        } catch(e) {
            logResult("Error writing test file: " + e.message);
        }

    } catch(e) {
            logResult("Error accessing file system: " + e.message);
        }
    }
    function logResult(result) {
        const resultElem = document.getElementById('result');
        resultElem.innerHTML = resultElem.innerHTML + result + "<br />\n";
    }
    async function checkLocation(){
       try {
           const position = await PassifloraIO.getCurrentPosition();
           console.log(position);
           logResult(`Latitude: ${position.coords.latitude}, Longitude: ${position.coords.longitude}`);
       } catch(e) {
           logResult('Geolocation error: ' + e.message + ' (code: ' + (e.code || 'N/A') + ')');
       }
}

    async function testScreenshot() {
        try {
            logResult("Taking screenshot...");
            var url = await PassifloraMedia.takeScreenshot();
            logResult("Screenshot URL: " + url);
            var img = document.getElementById('mediaPreview');
            img.src = url;
            img.style.display = 'block';
            img.scrollIntoView({behavior:'smooth'});
        } catch(e) {
            logResult("Screenshot error: " + e.message);
        }
    }

    async function testListCameras() {
        try {
            logResult("Listing cameras...");
            var cameras = await PassifloraMedia.listCameras();
            if (typeof cameras === 'string') cameras = JSON.parse(cameras);
            logResult("Found " + cameras.length + " camera(s):");
            for (var i = 0; i < cameras.length; i++) {
                logResult("  [" + i + "] id=" + cameras[i].id + " name=" + cameras[i].name + " position=" + cameras[i].position);
            }
        } catch(e) {
            logResult("List cameras error: " + e.message);
        }
    }

    async function testCaptureImage(cameraId) {
        try {
            if (typeof cameraId === 'number') {
                var cameras = await PassifloraMedia.listCameras();
                if (typeof cameras === 'string') cameras = JSON.parse(cameras);
                var idx = cameraId - 1;
                if (idx < 0 || idx >= cameras.length) {
                    logResult("Camera " + cameraId + " not found (only " + cameras.length + " available)");
                    return;
                }
                logResult("Using camera " + cameraId + ": " + cameras[idx].name);
                cameraId = cameras[idx].id;
            }
            logResult("Capturing image" + (cameraId ? " (" + cameraId + ")" : "") + "...");
            var url = await PassifloraMedia.captureImage(cameraId);
            logResult("Image URL: " + url);
            var img = document.getElementById('mediaPreview');
            img.src = url;
            img.style.display = 'block';
            img.scrollIntoView({behavior:'smooth'});
        } catch(e) {
            logResult("Capture image error: " + e.message);
        }
    }

    async function testStartAudio() {
        try {
            logResult("Starting audio recording...");
            await PassifloraMedia.startAudioRecording();
            logResult("Audio recording started. Press 'Stop Audio Recording' when done.");
        } catch(e) {
            logResult("Start audio error: " + e.message);
        }
    }

    async function testStopAudio() {
        try {
            logResult("Stopping audio recording...");
            await PassifloraMedia.stopAudioRecording();
            logResult("Audio recording stopped. Press 'Get Audio Recording' to retrieve.");
        } catch(e) {
            logResult("Stop audio error: " + e.message);
        }
    }

    async function testGetAudio() {
        try {
            logResult("Retrieving audio recording...");
            var url = await PassifloraMedia.getAudioRecording();
            logResult("Audio URL: " + url);
            var audio = document.getElementById('audioPreview');
            audio.src = url;
            audio.style.display = 'block';
            audio.scrollIntoView({behavior:'smooth'});
        } catch(e) {
            logResult("Get audio error: " + e.message);
        }
    }

    async function testStartVideo(cameraId) {
        try {
            if (typeof cameraId === 'number') {
                var cameras = await PassifloraMedia.listCameras();
                if (typeof cameras === 'string') cameras = JSON.parse(cameras);
                var idx = cameraId - 1;
                if (idx < 0 || idx >= cameras.length) {
                    logResult("Camera " + cameraId + " not found (only " + cameras.length + " available)");
                    return;
                }
                logResult("Using camera " + cameraId + ": " + cameras[idx].name);
                cameraId = cameras[idx].id;
            }
            logResult("Starting video recording...");
            await PassifloraMedia.startVideoRecording(cameraId);
            logResult("Video recording started. Press 'Stop Video Recording' when done.");
        } catch(e) {
            logResult("Start video error: " + e.message);
        }
    }

    async function testStopVideo() {
        try {
            logResult("Stopping video recording...");
            await PassifloraMedia.stopVideoRecording();
            logResult("Video recording stopped. Press 'Get Video Recording' to retrieve.");
        } catch(e) {
            logResult("Stop video error: " + e.message);
        }
    }

    async function testGetVideo() {
        try {
            logResult("Retrieving video recording...");
            var url = await PassifloraMedia.getVideoRecording();
            logResult("Video URL: " + url);
            var video = document.getElementById('videoPreview');
            video.src = url;
            video.style.display = 'block';
            video.scrollIntoView({behavior:'smooth'});
        } catch(e) {
            logResult("Get video error: " + e.message);
        }
    }
</script>
<script src="generated/config.js"></script>
<script src="passiflora/buildmenu.js"></script>
<script src="passiflora/PassifloraIO.js"></script>
<script src="passiflora/PassifloraMedia.js"></script>
<script src="app.js"></script>
<script src="init.js"></script>

</body>
</html>
