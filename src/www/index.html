<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <link rel="stylesheet" href="passiflora/menu.css">
</head>

<body>
    <div class="hamburgermenu">≡</div>
    <h1>Test Page</h1>
    <p>This is a test page for the HTML structure.</p>
    <p>
        <img src="test.png" alt="Test Image">
    </p>
    <p>
        <a href="test.html">Visit Test Page</a>
        <a href="https://amazon.com">Visit Amazon</a>
        <button onclick="PassifloraIO.openExternal('https://google.com')">Open Google in new browser window</button>
        <button onclick="checkLocation()">Check Location</button>
        <button onclick="testFileSystem()">Test File System</button>
    </p>
    <h2>Media Tests</h2>
    <p>
        <label for="cameraSelect">Camera:</label>
        <select id="cameraSelect"><option value="">-- select --</option></select>
        <label for="micSelect">Microphone:</label>
        <select id="micSelect"><option value="">-- select --</option></select>
        <button onclick="refreshDevices()">Refresh Devices</button>
    </p>
    <p>
        <button onclick="startMedia('both')">Start Camera + Microphone</button>
        <button onclick="startMedia('video')">Start Camera Only</button>
        <button onclick="startMedia('audio')">Start Microphone Only</button>
        <button onclick="stopMedia()">Stop</button>
        <button onclick="diagAudio()">Diagnose Audio</button>
    </p>
    <h2>Record &amp; Playback</h2>
    <p>
        <button id="recordBtn" onclick="toggleRecording()">Record Video + Audio</button>
        <button id="playBtn" onclick="playRecording()" disabled>Play Recording</button>
    </p>
    <div id="mediaContainer"></div>
    <p id="result">


    </p>
<script>
    let activeStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordedBlob = null;
    let nativeRecording = false;  // true when using GStreamer fallback
    let nativeRecordPath = '';

    function toggleRecording() {
        // Stop if already recording (either native or MediaRecorder)
        if (nativeRecording) {
            PassifloraIO.stopRecording().then(function() {
                document.getElementById('recordBtn').textContent = 'Record Video + Audio';
                document.getElementById('playBtn').disabled = false;
                logResult('Recording saved (native)');
                // Load the file as a blob for playback
                return PassifloraIO.fopen(nativeRecordPath, 'rb');
            }).then(function(fd) {
                // Read in chunks
                var chunks = [];
                function readChunk() {
                    return PassifloraIO.fread(fd, 65536).then(function(b64) {
                        if (!b64) { return PassifloraIO.fclose(fd).then(function() { return chunks; }); }
                        var binary = atob(b64);
                        var bytes = new Uint8Array(binary.length);
                        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        chunks.push(bytes);
                        if (bytes.length < 65536) return PassifloraIO.fclose(fd).then(function() { return chunks; });
                        return readChunk();
                    });
                }
                return readChunk();
            }).then(function(chunks) {
                recordedBlob = new Blob(chunks, { type: 'video/webm' });
                logResult('Recording saved (' + (recordedBlob.size / 1024).toFixed(1) + ' KB, video/webm)');
                stopMedia();
            }).catch(function(err) {
                logResult('Stop error: ' + err.message);
                stopMedia();
            });
            nativeRecording = false;
            return;
        }
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            return;
        }

        // Check if MediaRecorder is available
        if (typeof MediaRecorder !== 'undefined') {
            startWebRecording();
        } else {
            // Fall back to native GStreamer recording
            startNativeRecording();
        }
    }

    function startWebRecording() {
        // Get camera + mic stream for recording
        const camId = document.getElementById('cameraSelect').value;
        const micId = document.getElementById('micSelect').value;
        const constraints = {
            video: camId ? { deviceId: { exact: camId } } : true,
            audio: micId ? { deviceId: { exact: micId } } : true
        };
        navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) {
            stopMedia();
            activeStream = stream;
            recordedChunks = [];
            recordedBlob = null;
            document.getElementById('playBtn').disabled = true;

            // Show live preview
            const container = document.getElementById('mediaContainer');
            container.innerHTML = '';
            const preview = document.createElement('video');
            preview.autoplay = true;
            preview.playsInline = true;
            preview.muted = true;
            preview.style.maxWidth = '100%';
            preview.srcObject = stream;
            container.appendChild(preview);

            // Pick a supported MIME type
            let mimeType = '';
            var types = ['video/webm;codecs=vp8,opus', 'video/webm;codecs=vp9,opus',
                         'video/webm', 'video/mp4'];
            for (var i = 0; i < types.length; i++) {
                if (MediaRecorder.isTypeSupported(types[i])) { mimeType = types[i]; break; }
            }
            var options = mimeType ? { mimeType: mimeType } : {};
            mediaRecorder = new MediaRecorder(stream, options);
            mediaRecorder.ondataavailable = function(e) {
                if (e.data && e.data.size > 0) recordedChunks.push(e.data);
            };
            mediaRecorder.onstop = function() {
                var type = mediaRecorder.mimeType || 'video/webm';
                recordedBlob = new Blob(recordedChunks, { type: type });
                recordedChunks = [];
                document.getElementById('recordBtn').textContent = 'Record Video + Audio';
                document.getElementById('playBtn').disabled = false;
                logResult('Recording saved (' + (recordedBlob.size / 1024).toFixed(1) + ' KB, ' + type + ')');
                stopMedia();
            };
            mediaRecorder.start();
            document.getElementById('recordBtn').textContent = 'Stop Recording';
            logResult('Recording started...');
        })
        .catch(function(err) {
            alert('Cannot record: ' + err.name + ': ' + err.message);
        });
    }

    function startNativeRecording() {
        PassifloraIO.getHomeFolder().then(function(home) {
            nativeRecordPath = home + '/.passiflora_recording.webm';
            return PassifloraIO.startRecording(nativeRecordPath, true, true);
        }).then(function() {
            nativeRecording = true;
            recordedBlob = null;
            document.getElementById('playBtn').disabled = true;
            document.getElementById('recordBtn').textContent = 'Stop Recording';
            logResult('Recording started (native)...');
        }).catch(function(err) {
            alert('Cannot record: ' + err.message);
        });
    }

    function playRecording() {
        if (!recordedBlob) return;
        stopMedia();
        var container = document.getElementById('mediaContainer');
        container.innerHTML = '';
        var video = document.createElement('video');
        video.controls = true;
        video.autoplay = true;
        video.playsInline = true;
        video.style.maxWidth = '100%';
        video.src = URL.createObjectURL(recordedBlob);
        container.appendChild(video);
        logResult('Playing recording...');
    }

    function stopMedia() {
        if (activeStream) {
            activeStream.getTracks().forEach(function(t) { t.stop(); });
            activeStream = null;
        }
        const container = document.getElementById('mediaContainer');
        container.innerHTML = '';
    }

    function populateSelect(selectId, devices) {
        const sel = document.getElementById(selectId);
        const prev = sel.value;
        sel.innerHTML = '<option value="">-- default --</option>';
        devices.forEach(function(d, i) {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.textContent = d.label || (selectId === 'cameraSelect' ? 'Camera ' : 'Mic ') + (i + 1);
            sel.appendChild(opt);
        });
        if (prev) sel.value = prev;
    }

    function refreshDevices() {
        // Request each media type separately to avoid crashes when
        // one type is not permitted (e.g. no NSMicrophoneUsageDescription).
        // Skip audio getUserMedia if video succeeded — enumerateDevices
        // will still list microphones, and this avoids holding the audio
        // hardware (Android doesn't release it instantly after track.stop).
        let videoOk = false, audioOk = false;

        function tryVideo() {
            return navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(function(s) { videoOk = true; s.getTracks().forEach(function(t) { t.stop(); }); })
            .catch(function() {});
        }
        function tryAudio() {
            return navigator.mediaDevices.getUserMedia({ video: false, audio: true })
            .then(function(s) { audioOk = true; s.getTracks().forEach(function(t) { t.stop(); }); })
            .catch(function() {});
        }

        tryVideo().then(function() {
            if (videoOk) { audioOk = true; return; }
            return tryAudio();
        }).then(function() {
            return navigator.mediaDevices.enumerateDevices();
        })
        .then(function(devices) {
            const cameras = devices.filter(function(d) { return d.kind === 'videoinput'; });
            const mics = devices.filter(function(d) { return d.kind === 'audioinput'; });
            populateSelect('cameraSelect', cameras);
            populateSelect('micSelect', mics);
            const parts = [];
            if (videoOk) parts.push(cameras.length + ' camera(s)');
            if (audioOk) parts.push(mics.length + ' microphone(s)');
            if (parts.length) logResult('Found ' + parts.join(', ') + '.');
            else logResult('No camera or microphone access available.');
        })
        .catch(function(err) {
            logResult('Could not enumerate devices: ' + err.name + ': ' + err.message);
        });
    }

    function startMedia(mode) {
        stopMedia();
        const camId = document.getElementById('cameraSelect').value;
        const micId = document.getElementById('micSelect').value;
        const constraints = {};
        if (mode === 'video' || mode === 'both') {
            constraints.video = camId ? { deviceId: { exact: camId } } : true;
        } else {
            constraints.video = false;
        }
        if (mode === 'audio' || mode === 'both') {
            constraints.audio = micId ? { deviceId: { exact: micId } } : true;
        } else {
            constraints.audio = false;
        }
        navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) {
            activeStream = stream;
            const tracks = stream.getTracks().map(function(t) { return t.kind + ' (' + t.label + ')'; });
            logResult('Active: ' + tracks.join(', '));
            if (stream.getVideoTracks().length > 0) {
                const video = document.createElement('video');
                video.autoplay = true;
                video.playsInline = true;
                video.muted = true;
                video.style.maxWidth = '100%';
                video.srcObject = stream;
                document.getElementById('mediaContainer').appendChild(video);
            }
        })
        .catch(function(err) {
            alert('Error (' + mode + '): ' + err.name + ': ' + err.message);
        });
    }

    // Populate device lists on startup
    refreshDevices();
   
    async function testFileSystem() {
        try {
            const username = await PassifloraIO.getUsername();
            logResult("Current username: " + username);
        } catch(e) {
            logResult("Error getting username: " + e.message);
        }
        try {
           let homeFolder = await PassifloraIO.getHomeFolder();
            logResult("Home folder: " + homeFolder);
            try {
            let checkPath = homeFolder + "/frompassiflora.txt";
            let fh = await fopen(checkPath, "r");
            await fclose(fh);
            logResult("Persisted file " + checkPath + " from previous run present: yes");
        } catch(e) {
            logResult("Persisted file " + homeFolder + "/frompassiflora.txt from previous run present: no");
        }
            try {
            logResult("Testing file write...");
            let testFilePath = homeFolder + "/testfile.txt";
            let fh = await fopen(testFilePath, "w");
            await fputs(fh, "This is a test file.");
            await fclose(fh);
            logResult("Successfully wrote to file: " + testFilePath);
        } catch(e) {
            logResult("Error writing test file: " + e.message);
        }
  
        try {
            logResult("Testing file read...");
            let testFilePath = homeFolder + "/testfile.txt";
            let fh = await fopen(testFilePath, "r");
            let contents = await fgets(fh);
            await fclose(fh);
            logResult("Contents of test file: " + contents);
        } catch(e) {
            logResult("Error reading test file: " + e.message);
        }
        try {
            logResult ("Testing file delete...");
            let testFilePath = homeFolder + "/testfile.txt";
            await remove(testFilePath);
            logResult("Successfully deleted test file: " + testFilePath);
        } catch(e) {
            logResult("Error deleting test file: " + e.message);
        }
        try {
            logResult("Testing (to be left in file system)...");
            let testFilePath = homeFolder + "/frompassiflora.txt";
            let fh = await fopen(testFilePath, "w");
            await fputs(fh, "This file was created by Passiflora as a test of file system persistence. It should remain in the home folder after this test. Created at: " + new Date().toString());
            await fclose(fh);
            logResult("Successfully wrote to file: " + testFilePath);
            logResult("You should now have a file named 'frompassiflora.txt' in the home folder.");
            
        } catch(e) {
            logResult("Error writing test file: " + e.message);
        }

        // Test sandbox enforcement: try writing outside the home folder
        try {
            logResult("Testing sandbox: writing outside home folder...");
            let outsidePath = homeFolder + "/../sandbox_escape_test.txt";
            let fh = await fopen(outsidePath, "w");
            await fputs(fh, "This should not exist.");
            await fclose(fh);
            logResult("WARNING: wrote outside home folder (unrestrictedfilesystemaccess must be on): " + outsidePath);
            // Clean up
            try { await remove(outsidePath); } catch(ignore) {}
        } catch(e) {
            logResult("Sandbox OK — blocked write outside home folder: " + e.message);
        }

    } catch(e) {
            logResult("Error accessing file system: " + e.message);
        }
    }
    function logResult(result) {
        const resultElem = document.getElementById('result');
        const line = document.createElement('div');
        line.textContent = result;
        resultElem.appendChild(line);
    }
    function diagAudio() {
        logResult('--- Audio diagnostics ---');
        logResult('isSecureContext: ' + window.isSecureContext);
        logResult('userAgent: ' + navigator.userAgent);
        if (window.PassifloraBridge && window.PassifloraBridge.checkPermissions) {
            logResult('Android permissions: ' + window.PassifloraBridge.checkPermissions());
        }
        navigator.mediaDevices.enumerateDevices().then(function(devs) {
            const mics = devs.filter(function(d) { return d.kind === 'audioinput'; });
            logResult('audioinput devices: ' + mics.length);
            mics.forEach(function(d, i) {
                logResult('  [' + i + '] id=' + d.deviceId + ' label=' + d.label + ' group=' + d.groupId);
            });

            logResult('Test 1: getUserMedia({audio: true}) ...');
            return navigator.mediaDevices.getUserMedia({audio: true}).then(function(s) {
                logResult('Test 1 SUCCESS');
                s.getTracks().forEach(function(t) { logResult('  ' + t.kind + ' ' + t.label); t.stop(); });
            }).catch(function(e) {
                logResult('Test 1 FAIL: ' + e.name + ': ' + e.message);

                logResult('Test 2: getUserMedia({audio: true, video: true}) ...');
                return navigator.mediaDevices.getUserMedia({audio: true, video: true}).then(function(s) {
                    logResult('Test 2 SUCCESS (audio+video together works!)');
                    s.getTracks().forEach(function(t) { logResult('  ' + t.kind + ' ' + t.label); t.stop(); });
                }).catch(function(e2) {
                    logResult('Test 2 FAIL: ' + e2.name + ': ' + e2.message);

                    logResult('Test 3: getUserMedia({video: true}) then getUserMedia({audio: true}) ...');
                    return navigator.mediaDevices.getUserMedia({video: true}).then(function(vs) {
                        logResult('  video stream got, now trying audio...');
                        return navigator.mediaDevices.getUserMedia({audio: true}).then(function(as) {
                            logResult('Test 3 SUCCESS (audio works after video opened!)');
                            as.getTracks().forEach(function(t) { logResult('  ' + t.kind + ' ' + t.label); t.stop(); });
                            vs.getTracks().forEach(function(t) { t.stop(); });
                        }).catch(function(e3) {
                            logResult('Test 3 FAIL: ' + e3.name + ': ' + e3.message);
                            vs.getTracks().forEach(function(t) { t.stop(); });
                        });
                    });
                });
            });
        });
    }
    function checkLocation(){
       if (!navigator.geolocation) {
           logResult('Geolocation API not supported');
           return;
       }
       navigator.geolocation.getCurrentPosition(
           function(position) {
               logResult('Latitude: ' + position.coords.latitude +
                          ', Longitude: ' + position.coords.longitude);
           },
           function(e) {
               logResult('Geolocation error: ' + e.message + ' (code: ' + (e.code || 'N/A') + ')');
           }
       );
    }

</script>

<script src="passiflora/buildmenu.js"></script>
