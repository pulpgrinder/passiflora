<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <link rel="stylesheet" href="passiflora/menu.css">
</head>

<body>
    <div class="hamburgermenu">≡</div>
    <h1>Test Page</h1>
    <p>This is a test page for the HTML structure.</p>
    <p>
        <img src="test.png" alt="Test Image">
    </p>
    <p>
        <a href="test.html">Visit Test Page</a>
        <a href="https://amazon.com">Visit Amazon</a>
        <button onclick="PassifloraIO.openExternal('https://google.com')">Open Google in new browser window</button>
        <button onclick="checkLocation()">Check Location</button>
        <button onclick="testFileSystem()">Test File System</button>
    </p>
    <h2>Media Tests</h2>
    <p>
        <label for="cameraSelect">Camera:</label>
        <select id="cameraSelect"><option value="">-- select --</option></select>
        <label for="micSelect">Microphone:</label>
        <select id="micSelect"><option value="">-- select --</option></select>
        <button onclick="refreshDevices()">Refresh Devices</button>
    </p>
    <p>
        <button onclick="startMedia('both')">Start Camera + Microphone</button>
        <button onclick="startMedia('video')">Start Camera Only</button>
        <button onclick="startMedia('audio')">Start Microphone Only</button>
        <button onclick="stopMedia()">Stop</button>
    </p>
    <div id="mediaContainer"></div>
    <p id="result">


    </p>
<script>
    let activeStream = null;

    function stopMedia() {
        if (activeStream) {
            activeStream.getTracks().forEach(function(t) { t.stop(); });
            activeStream = null;
        }
        const container = document.getElementById('mediaContainer');
        container.innerHTML = '';
    }

    function populateSelect(selectId, devices) {
        const sel = document.getElementById(selectId);
        const prev = sel.value;
        sel.innerHTML = '<option value="">-- default --</option>';
        devices.forEach(function(d, i) {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.textContent = d.label || (selectId === 'cameraSelect' ? 'Camera ' : 'Mic ') + (i + 1);
            sel.appendChild(opt);
        });
        if (prev) sel.value = prev;
    }

    function refreshDevices() {
        // Request each media type separately to avoid crashes when
        // one type is not permitted (e.g. no NSMicrophoneUsageDescription).
        let videoOk = false, audioOk = false;

        function tryVideo() {
            return navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(function(s) { videoOk = true; s.getTracks().forEach(function(t) { t.stop(); }); })
            .catch(function() {});
        }
        function tryAudio() {
            return navigator.mediaDevices.getUserMedia({ video: false, audio: true })
            .then(function(s) { audioOk = true; s.getTracks().forEach(function(t) { t.stop(); }); })
            .catch(function() {});
        }

        tryVideo().then(tryAudio).then(function() {
            return navigator.mediaDevices.enumerateDevices();
        })
        .then(function(devices) {
            const cameras = devices.filter(function(d) { return d.kind === 'videoinput'; });
            const mics = devices.filter(function(d) { return d.kind === 'audioinput'; });
            populateSelect('cameraSelect', cameras);
            populateSelect('micSelect', mics);
            const parts = [];
            if (videoOk) parts.push(cameras.length + ' camera(s)');
            if (audioOk) parts.push(mics.length + ' microphone(s)');
            if (parts.length) logResult('Found ' + parts.join(', ') + '.');
            else logResult('No camera or microphone access available.');
        })
        .catch(function(err) {
            logResult('Could not enumerate devices: ' + err.name + ': ' + err.message);
        });
    }

    function startMedia(mode) {
        stopMedia();
        const camId = document.getElementById('cameraSelect').value;
        const micId = document.getElementById('micSelect').value;
        const constraints = {};
        if (mode === 'video' || mode === 'both') {
            constraints.video = camId ? { deviceId: { exact: camId } } : true;
        } else {
            constraints.video = false;
        }
        if (mode === 'audio' || mode === 'both') {
            constraints.audio = micId ? { deviceId: { exact: micId } } : true;
        } else {
            constraints.audio = false;
        }
        navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) {
            activeStream = stream;
            const tracks = stream.getTracks().map(function(t) { return t.kind + ' (' + t.label + ')'; });
            logResult('Active: ' + tracks.join(', '));
            if (stream.getVideoTracks().length > 0) {
                const video = document.createElement('video');
                video.autoplay = true;
                video.playsInline = true;
                video.muted = true;
                video.style.maxWidth = '100%';
                video.srcObject = stream;
                document.getElementById('mediaContainer').appendChild(video);
            }
        })
        .catch(function(err) {
            alert('Error (' + mode + '): ' + err.name + ': ' + err.message);
        });
    }

    // Populate device lists on startup
    refreshDevices();
   
    async function testFileSystem() {
        try {
            const username = await PassifloraIO.getUsername();
            logResult("Current username: " + username);
        } catch(e) {
            logResult("Error getting username: " + e.message);
        }
        try {
           let homeFolder = await PassifloraIO.getHomeFolder();
            logResult("Home folder: " + homeFolder);
            try {
            logResult("Testing file write...");
            let testFilePath = homeFolder + "/testfile.txt";
            let fh = await fopen(testFilePath, "w");
            await fputs(fh, "This is a test file.");
            await fclose(fh);
            logResult("Successfully wrote to file: " + testFilePath);
        } catch(e) {
            logResult("Error writing test file: " + e.message);
        }
  
        try {
            logResult("Testing file read...");
            let testFilePath = homeFolder + "/testfile.txt";
            let fh = await fopen(testFilePath, "r");
            let contents = await fgets(fh);
            await fclose(fh);
            logResult("Contents of test file: " + contents);
        } catch(e) {
            logResult("Error reading test file: " + e.message);
        }
        try {
            logResult ("Testing file delete...");
            let testFilePath = homeFolder + "/testfile.txt";
            await remove(testFilePath);
            logResult("Successfully deleted test file: " + testFilePath);
        } catch(e) {
            logResult("Error deleting test file: " + e.message);
        }
        try {
            logResult("Testing (to be left in file system)...");
            let testFilePath = homeFolder + "/frompassiflora.txt";
            let fh = await fopen(testFilePath, "w");
            await fputs(fh, "This is a test file from passiflora.");
            await fclose(fh);
            logResult("Successfully wrote to file: " + testFilePath);
            logResult("You should now have a file named 'frompassiflora.txt' in the home folder.");
            logResult("On iPhone and iPad, the home folder will appear in the Files app at On My (iPhone or iPad)/" + PassifloraConfig.progname);
            logResult("On Mac, the home folder will be your user home directory, typically /Users/&lt;username&gt;.");
            logResult("On Windows, the home folder will be your user profile directory, typically C:\\Users\\&lt;username&gt;.");
            logResult("On Linux, the home folder will be your user home directory, typically /home/&lt;username&gt;.");
            logResult("On Android, the home folder will be in Documents/" + PassifloraConfig.progname + ", accessible via the Files app or any file manager.");
            logResult("(Note: On Android, access to this public folder requires the androidexternalstorage permission to be enabled in src/permissions.)");
        } catch(e) {
            logResult("Error writing test file: " + e.message);
        }

    } catch(e) {
            logResult("Error accessing file system: " + e.message);
        }
    }
    function logResult(result) {
        const resultElem = document.getElementById('result');
        resultElem.innerHTML = resultElem.innerHTML + result + "<br />\n";
    }
    function checkLocation(){
       if (!navigator.geolocation) {
           logResult('Geolocation API not supported');
           return;
       }
       navigator.geolocation.getCurrentPosition(
           function(position) {
               logResult('Latitude: ' + position.coords.latitude +
                          ', Longitude: ' + position.coords.longitude);
           },
           function(e) {
               logResult('Geolocation error: ' + e.message + ' (code: ' + (e.code || 'N/A') + ')');
           }
       );
    }

</script>
<script src="generated/config.js"></script>
<script src="passiflora/buildmenu.js"></script>
<script src="passiflora/PassifloraIO.js"></script>
<script src="app.js"></script>
<script src="init.js"></script>

</body>
</html>
