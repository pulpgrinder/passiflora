<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Test App</title>
    <link rel="stylesheet" href="passiflora/theme.css">
</head>

<body>
    <div class="hamburgermenu">≡</div>
    <h1>Test App</h1>
    <p>This is a test app for Passiflora.</p>
    <p>
        <img src="test.png" alt="Test Image">
    </p>

    <h2>Navigation</h2>
    <p>
        <span class="buttonbar">
        <button onclick="window.location.href='test.html'">Open Internal HTML Page in App</button>
        <button onclick="PassifloraIO.openExternal('https://google.com')">Open External Page in Browser</button>
        <button onclick="checkLocation()">Check Location</button>
        </span>
    </p>

    <h2>File System</h2>
    <p>
        <span class="buttonbar">
        <button onclick="testFileSystem()">Test File System</button>
        <button onclick="testMenuOpen()">Test Menu Open</button>
        <button onclick="testMenuSaveAs()">Test Save As</button>
        <button onclick="testFileBrowser()">Test File Browser</button>
        </span>
    </p>
    <p>
        <span class="buttonbar">
        <button onclick="testImportFile()">Import File</button>
        <button onclick="testExportFile()">Export File</button>
        <button onclick="testExportVFS()">Export VFS</button>
        <button onclick="testImportVFS()">Import VFS</button>
        <button onclick="testEraseVFS()">Erase VFS</button>
        <button onclick="testResetVFS()">Reset VFS</button>
        </span>
    </p>

    <h2>Record &amp; Playback</h2>
    <p>
        <label for="cameraSelect">Camera:</label>
        <select id="cameraSelect"><option value="">-- select --</option></select>
        <label for="micSelect">Microphone:</label>
        <select id="micSelect"><option value="">-- select --</option></select>
        <button onclick="refreshDevices()">Refresh Devices</button>
    </p>
    <p>
        <span class="buttonbar">
        <button id="recordBtn" onclick="toggleRecording()">Record Video + Audio</button>
        <button id="playBtn" onclick="playRecording()" disabled>Play Recording</button>
        </span>
    </p>
    <div id="mediaContainer"></div>
    <p id="result">


    </p>
<script>
    let activeStream = null;
    let recordedBlob = null;
    let isRecording = false;

    function toggleRecording() {
        if (isRecording) {
            PassifloraIO.stopRecording().then(function(result) {
                document.getElementById('recordBtn').textContent = 'Record Video + Audio';
                document.getElementById('playBtn').disabled = false;
                isRecording = false;
                if (result) {
                    const data = result.data || result;
                    const mime = result.mimeType || 'video/webm';
                    recordedBlob = new Blob([data], { type: mime });
                    logResult('Recording saved (' + (recordedBlob.size / 1024).toFixed(1) + ' KB, ' + mime + ')');
                } else {
                    logResult('Recording stopped (no data returned)');
                }
            }).catch(function(err) {
                logResult('Stop error: ' + err.message);
                isRecording = false;
            });
            return;
        }

        PassifloraIO.hasNativeRecording().then(function(has) {
            if (has) {
                return PassifloraIO.startRecording(true, true).then(function() {
                    isRecording = true;
                    recordedBlob = null;
                    document.getElementById('playBtn').disabled = true;
                    document.getElementById('recordBtn').textContent = 'Stop Recording';
                    logResult('Recording started...');
                });
            } else {
                alert('Recording is not available on this platform.');
            }
        }).catch(function(err) {
            alert('Cannot record: ' + err.message);
        });
    }

    function playRecording() {
        if (!recordedBlob) return;
        const container = document.getElementById('mediaContainer');
        container.innerHTML = '';

        const video = document.createElement('video');
        video.controls = true;
        video.playsInline = true;
        video.muted = false;
        video.volume = 1.0;
        video.style.maxWidth = '100%';
        video.src = URL.createObjectURL(recordedBlob);
        video.onerror = function() {
            const e = video.error;
            logResult('Video error: code=' + (e ? e.code : '?') + ' msg=' + (e ? e.message : '?'));
        };
        container.appendChild(video);
        video.play().catch(function(e) {
            logResult('Play failed: ' + e.name + ': ' + e.message);
        });
        logResult('Playing recording...');
    }

    function stopMedia() {
        if (activeStream) {
            activeStream.getTracks().forEach(function(t) { t.stop(); });
            activeStream = null;
        }
        const container = document.getElementById('mediaContainer');
        container.innerHTML = '';
    }

    function populateSelect(selectId, devices) {
        const sel = document.getElementById(selectId);
        const prev = sel.value;
        sel.innerHTML = '<option value="">-- default --</option>';
        const seen = {};
        devices.forEach(function(d, i) {
            if (!d.deviceId || seen[d.deviceId]) return;
            seen[d.deviceId] = true;
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.textContent = d.label || (selectId === 'cameraSelect' ? 'Camera ' : 'Mic ') + (i + 1);
            sel.appendChild(opt);
        });
        if (prev) sel.value = prev;
    }

    function refreshDevices() {
        // Request each media type separately to avoid crashes when
        // one type is not permitted (e.g. no NSMicrophoneUsageDescription).
        // Skip audio getUserMedia if video succeeded — enumerateDevices
        // will still list microphones, and this avoids holding the audio
        // hardware (Android doesn't release it instantly after track.stop).
        let videoOk = false, audioOk = false;

        function tryVideo() {
            return navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(function(s) { videoOk = true; s.getTracks().forEach(function(t) { t.stop(); }); })
            .catch(function() {});
        }
        function tryAudio() {
            return navigator.mediaDevices.getUserMedia({ video: false, audio: true })
            .then(function(s) { audioOk = true; s.getTracks().forEach(function(t) { t.stop(); }); })
            .catch(function() {});
        }

        tryVideo().then(function() {
            if (videoOk) { audioOk = true; return; }
            return tryAudio();
        }).then(function() {
            return navigator.mediaDevices.enumerateDevices();
        })
        .then(function(devices) {
            const cameras = devices.filter(function(d) { return d.kind === 'videoinput'; });
            const mics = devices.filter(function(d) { return d.kind === 'audioinput'; });
            populateSelect('cameraSelect', cameras);
            populateSelect('micSelect', mics);
            const parts = [];
            if (videoOk) parts.push(cameras.length + ' camera(s)');
            if (audioOk) parts.push(mics.length + ' microphone(s)');
            if (parts.length) logResult('Found ' + parts.join(', ') + '.');
            else logResult('No camera or microphone access available.');
        })
        .catch(function(err) {
            logResult('Could not enumerate devices: ' + err.name + ': ' + err.message);
        });
    }

    // Populate device lists on startup
    refreshDevices();
   
    async function testFileSystem() {
        try {
            try {
            let checkPath = "/frompassiflora.txt";
            let fh = await fopen(checkPath, "r");
            await fclose(fh);
            logResult("Persisted file " + checkPath + " from previous run present: yes");
            fh = await fopen(checkPath, "r");
            let contents = await fgets(fh);
            await fclose(fh);
            logResult("Contents of persisted file: " + contents);
        } catch(e) {
            logResult("Persisted file /frompassiflora.txt from previous run present: no");
        }
            try {
            logResult("Testing file write...");
            let testFilePath = "/testfile.txt";
            let fh = await fopen(testFilePath, "w");
            await fputs(fh, "This is a test file.");
            await fclose(fh);
            logResult("Successfully wrote to file: " + testFilePath);
        } catch(e) {
            logResult("Error writing test file: " + e.message);
        }
  
        try {
            logResult("Testing file read...");
            let testFilePath = "/testfile.txt";
            let fh = await fopen(testFilePath, "r");
            let contents = await fgets(fh);
            await fclose(fh);
            logResult("Contents of test file: " + contents);
        } catch(e) {
            logResult("Error reading test file: " + e.message);
        }
        try {
            logResult ("Testing file delete...");
            let testFilePath = "/testfile.txt";
            await remove(testFilePath);
            logResult("Successfully deleted test file: " + testFilePath);
        } catch(e) {
            logResult("Error deleting test file: " + e.message);
        }
        try {
            logResult("Testing (to be left in file system)...");
            let testFilePath = "/frompassiflora.txt";
            let fh = await fopen(testFilePath, "w");
            await fputs(fh, "This file was created by Passiflora as a test of file system persistence. It should remain after this test. Created at: " + new Date().toString());
            await fclose(fh);
            logResult("Successfully wrote to file: " + testFilePath);
            logResult("You should now have a file named 'frompassiflora.txt' in the VFS root.");
            
        } catch(e) {
            logResult("Error writing test file: " + e.message);
        }

    } catch(e) {
            logResult("Error accessing file system: " + e.message);
        }
    }
    function logResult(result) {
        const resultElem = document.getElementById('result');
        const line = document.createElement('div');
        line.textContent = result;
        resultElem.appendChild(line);
    }
    async function testMenuOpen() {
        logResult('Opening file picker for frompassiflora.txt...');
        try {
            const result = await PassifloraIO.menuOpen(
                ['.txt'], '');
            if (result) {
                logResult('menuOpen returned: ' + result);
            } else {
                logResult('menuOpen cancelled (returned null)');
            }
        } catch(e) {
            logResult('menuOpen error: ' + e.message);
        }
    }

    async function testMenuSaveAs() {
        logResult('Opening Save As for .txt files...');
        try {
            const result = await PassifloraIO.menuSaveAs(
                ['.txt'], 'untitled.txt');
            if (result) {
                logResult('menuSaveAs returned: ' + result);
                /* Write test data and close to trigger the save/download */
                const fh = await fopen(result, 'w');
                await fputs(fh, 'Hello from Passiflora WWW test!\nSaved at: ' + new Date().toString());
                await fclose(fh);
                logResult('File saved.');
            } else {
                logResult('menuSaveAs cancelled (returned null)');
            }
        } catch(e) {
            logResult('menuSaveAs error: ' + e.message);
        }
    }

    async function testFileBrowser() {
        logResult('Opening file browser for .txt files...');
        try {
            await PassifloraIO.fileBrowser(['.txt'], '');
            logResult('File browser closed.');
        } catch(e) {
            logResult('fileBrowser error: ' + e.message);
        }
    }

    async function testExportVFS() {
        logResult('Exporting VFS...');
        try {
            const count = await PassifloraIO.exportVFS();
            logResult('Exported ' + count + ' file(s) to passiflora_vfs.json');
        } catch(e) {
            alert(e.message);
        }
    }

    async function testImportVFS() {
        logResult('Importing VFS...');
        try {
            const count = await PassifloraIO.importVFS();
            if (count > 0) {
                logResult('Imported ' + count + ' file(s) into VFS');
            } else {
                logResult('Import cancelled (no file selected)');
            }
        } catch(e) {
            alert(e.message);
        }
    }

    async function testEraseVFS() {
        logResult('Erasing VFS...');
        try {
            const count = await PassifloraIO.eraseVFS();
            if (count > 0) {
                logResult('Erased ' + count + ' file(s) from VFS');
            } else {
                logResult('Erase cancelled');
            }
        } catch(e) {
            alert(e.message);
        }
    }

    async function testResetVFS() {
        logResult('Resetting VFS to preloaded data...');
        try {
            await PassifloraIO.resetVFS();
            logResult('VFS reset complete');
        } catch(e) {
            alert(e.message);
        }
    }

    async function testImportFile() {
        logResult('Importing file from real filesystem...');
        try {
            const vpath = await PassifloraIO.importFile();
            if (vpath) {
                logResult('Imported to VFS path: ' + vpath);
            } else {
                logResult('Import cancelled (no file selected)');
            }
        } catch(e) {
            logResult('importFile error: ' + e.message);
        }
    }

    async function testExportFile() {
        logResult('Browse for a file to export...');
        try {
            const chosen = await PassifloraIO.menuOpen([], '/');
            if (!chosen) {
                logResult('Export cancelled (no file selected)');
                return;
            }
            logResult('Exporting: ' + chosen);
            const result = await PassifloraIO.exportFile(chosen);
            if (result) {
                logResult('Exported ' + result);
            } else {
                logResult('Export cancelled');
            }
        } catch(e) {
            logResult('exportFile error: ' + e.message);
        }
    }

    function checkLocation(){
       if (!navigator.geolocation) {
           logResult('Geolocation API not supported');
           return;
       }
       navigator.geolocation.getCurrentPosition(
           function(position) {
               logResult('Latitude: ' + position.coords.latitude +
                          ', Longitude: ' + position.coords.longitude);
           },
           function(e) {
               logResult('Geolocation error: ' + e.message + ' (code: ' + (e.code || 'N/A') + ')');
           }
       );
    }

</script>
<script src="generated/config.js"></script>
<script src="generated/vfspreload.js"></script>

 <script src="passiflora/themes.js"></script>

</body>
