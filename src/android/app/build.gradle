plugins {
    id 'com.android.application'
}

// Keep Gradle build outputs under bin/Android/ alongside the other platforms.
layout.buildDirectory = file("../../../bin/Android/gradle-build/app")

android {
    namespace 'com.example.zipserve'
    compileSdk 35
    ndkVersion '29.0.14206865'

    defaultConfig {
        applicationId "com.example.HeckinChonker"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0.0"

        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }
    }

    signingConfigs {
        // Test keystore shipped with the repo — NOT for production use.
        // Override with environment variables for a real keystore:
        //   RELEASE_KEYSTORE, RELEASE_KEYSTORE_PASSWORD,
        //   RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD
        release {
            storeFile     file(System.getenv("RELEASE_KEYSTORE") ?: "../release.jks")
            storePassword System.getenv("RELEASE_KEYSTORE_PASSWORD") ?: "testtest"
            keyAlias      System.getenv("RELEASE_KEY_ALIAS") ?: "mykey"
            keyPassword   System.getenv("RELEASE_KEY_PASSWORD") ?: "testtest"
        }
    }

    externalNativeBuild {
        cmake {
            path file("../CMakeLists.txt")
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
    packaging {
        jniLibs {
            useLegacyPackaging false
        }
    }
}
