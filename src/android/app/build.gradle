plugins {
    id 'com.android.application'
}

// Keep Gradle build outputs under bin/Android/ alongside the other platforms.
layout.buildDirectory = file("../../../bin/Android/gradle-build/app")

android {
    namespace 'com.example.zipserve'
    compileSdk 35
    ndkVersion '29.0.14206865'

    defaultConfig {
        applicationId "com.example.HeckinChonker"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0.0"

        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }
    }

    externalNativeBuild {
        cmake {
            path file("../CMakeLists.txt")
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}
