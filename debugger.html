<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passiflora Debugger</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2em auto; padding: 0 1em; }
  label { display: block; margin-top: 1em; font-weight: bold; }
  input, textarea { width: 100%; box-sizing: border-box; font-family: monospace; font-size: 14px; }
  input { padding: 6px; }
  textarea { padding: 8px; min-height: 120px; }
  button { margin-top: 1em; padding: 8px 20px; font-size: 14px; cursor: pointer; }
  #status { margin-top: 1em; padding: 10px; background: #f0f0f0; border-radius: 4px;
            font-family: monospace; white-space: pre-wrap; min-height: 2em; }
  .error { color: #c00; }
  .ok { color: #060; }
</style>
</head>
<body>
<h1>Passiflora Debugger</h1>
<p>Enter the device's IP address/hostname, port, passphrase, and JavaScript to execute.</p>

<label for="host">Host (IP address or hostname of the device)</label>
<input type="text" id="host" placeholder="e.g. 192.168.1.42 or 127.0.0.1" value="127.0.0.1">

<label for="port">Port</label>
<input type="text" id="port" placeholder="e.g. 60593" style="width:120px;">

<label for="key">Passphrase</label>
<input type="password" id="key" placeholder="Enter the passphrase you set in the app">

<label for="code">JavaScript</label>
<textarea id="code" placeholder="document.title"></textarea>

<button onclick="sendDebug()">Execute</button>

<div id="status"></div>

<script>
/* ── Pure-JS SHA-256 (FIPS 180-4) ─────────────────────────────── */
function sha256bytes(bytes) {
    var K = [
        0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
        0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
        0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
        0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
        0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
        0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
        0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
        0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
    ];
    function rr(x,n){return(x>>>n)|(x<<(32-n));}
    var b = bytes.slice();
    var bitLen = b.length * 8;
    b.push(0x80);
    while ((b.length % 64) !== 56) b.push(0);
    for (var s = 56; s >= 0; s -= 8) b.push((bitLen / Math.pow(2, s)) & 0xff);
    var H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    for (var off = 0; off < b.length; off += 64) {
        var W = [];
        for (var t = 0; t < 16; t++) W[t] = (b[off+t*4]<<24)|(b[off+t*4+1]<<16)|(b[off+t*4+2]<<8)|b[off+t*4+3];
        for (var t = 16; t < 64; t++) {
            var s0 = rr(W[t-15],7)^rr(W[t-15],18)^(W[t-15]>>>3);
            var s1 = rr(W[t-2],17)^rr(W[t-2],19)^(W[t-2]>>>10);
            W[t] = (W[t-16]+s0+W[t-7]+s1)|0;
        }
        var a=H[0],bb=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
        for (var t = 0; t < 64; t++) {
            var S1=rr(e,6)^rr(e,11)^rr(e,25), ch=(e&f)^(~e&g), temp1=(h+S1+ch+K[t]+W[t])|0;
            var S0=rr(a,2)^rr(a,13)^rr(a,22), maj=(a&bb)^(a&c)^(bb&c), temp2=(S0+maj)|0;
            h=g;g=f;f=e;e=(d+temp1)|0;d=c;c=bb;bb=a;a=(temp1+temp2)|0;
        }
        H[0]=(H[0]+a)|0;H[1]=(H[1]+bb)|0;H[2]=(H[2]+c)|0;H[3]=(H[3]+d)|0;
        H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
    }
    var out = [];
    for (var i = 0; i < 8; i++) {
        var v = H[i] >>> 0;
        out.push((v>>24)&0xff,(v>>16)&0xff,(v>>8)&0xff,v&0xff);
    }
    return out;
}

function strToBytes(s) {
    var bytes = [];
    for (var i = 0; i < s.length; i++) {
        var c = s.charCodeAt(i);
        if (c < 0x80) bytes.push(c);
        else if (c < 0x800) { bytes.push(0xc0|(c>>6), 0x80|(c&0x3f)); }
        else if (c < 0x10000) { bytes.push(0xe0|(c>>12), 0x80|((c>>6)&0x3f), 0x80|(c&0x3f)); }
        else { bytes.push(0xf0|(c>>18), 0x80|((c>>12)&0x3f), 0x80|((c>>6)&0x3f), 0x80|(c&0x3f)); }
    }
    return bytes;
}

/* HMAC-SHA256 per RFC 2104 */
function hmacSHA256(key, message) {
    var blockSize = 64;
    var keyBytes = strToBytes(key);
    if (keyBytes.length > blockSize) keyBytes = sha256bytes(keyBytes);
    while (keyBytes.length < blockSize) keyBytes.push(0);
    var ipad = [], opad = [];
    for (var i = 0; i < blockSize; i++) {
        ipad.push(keyBytes[i] ^ 0x36);
        opad.push(keyBytes[i] ^ 0x5c);
    }
    var msgBytes = strToBytes(message);
    var inner = sha256bytes(ipad.concat(msgBytes));
    var outer = sha256bytes(opad.concat(inner));
    var hex = '';
    for (var i = 0; i < outer.length; i++) hex += ('0' + outer[i].toString(16)).slice(-2);
    return hex;
}

/* ── Debugger logic ───────────────────────────────────────────── */
var debugNonce = 0;

function sendDebug() {
    var statusEl = document.getElementById('status');
    var host = document.getElementById('host').value.trim();
    var port = document.getElementById('port').value.trim();
    var key = document.getElementById('key').value;
    var code = document.getElementById('code').value;

    if (!host || !port || !key || !code) {
        statusEl.textContent = 'All fields are required.';
        statusEl.className = 'error';
        return;
    }

    debugNonce = Date.now() * 1000 + Math.floor(Math.random() * 1000);
    var sig = hmacSHA256(key, debugNonce + ':' + code);
    var payload = JSON.stringify({
        javascript: code,
        signature: sig,
        nonce: debugNonce
    });

    statusEl.textContent = 'Sending...';
    statusEl.className = '';
    var baseUrl = 'http://' + host + ':' + port;

    fetch(baseUrl + '/__passiflora/debug', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: payload
    }).then(function (resp) {
        if (resp.ok) {
            statusEl.textContent = 'Sent OK — waiting for result...';
            statusEl.className = 'ok';
            var attempts = 0;
            var maxAttempts = 20;
            var poll = setInterval(function () {
                attempts++;
                fetch(baseUrl + '/__passiflora/debug_result').then(function (r) {
                    if (r.status === 200) {
                        clearInterval(poll);
                        r.json().then(function (result) {
                            var parts = [];
                            if (result.output) parts.push(result.output);
                            if (result.error) parts.push('ERROR: ' + result.error);
                            statusEl.textContent = 'Result:\n' + parts.join('\n');
                            statusEl.className = 'ok';
                        });
                    } else if (attempts >= maxAttempts) {
                        clearInterval(poll);
                        statusEl.textContent = 'Sent OK\n(no result returned within timeout)';
                        statusEl.className = 'ok';
                    }
                }).catch(function (e) {
                    if (attempts >= maxAttempts) {
                        clearInterval(poll);
                        statusEl.textContent = 'Sent OK\n(could not retrieve result: ' + e.message + ')';
                        statusEl.className = 'ok';
                    }
                });
            }, 250);
        } else {
            resp.text().then(function (body) {
                statusEl.textContent = 'HTTP ' + resp.status + '\n' + body;
                statusEl.className = 'error';
            });
        }
    }).catch(function (e) {
        statusEl.textContent = 'Error: ' + e.message;
        statusEl.className = 'error';
    });
}
</script>
</body>
</html>
